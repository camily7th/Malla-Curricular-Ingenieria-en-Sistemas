<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Malla Curricular - Ingeniería en Sistemas</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      background: #f4f2f8;
      color: #3a2e4f;
      overflow: hidden;
    }

    h1 {
      text-align: center;
      color: #5c3d79;
      margin: 0;
      padding: 2.5rem 1rem;
      font-size: 2.4rem;
      border-bottom: 1px solid #ddd;
    }

    .grid {
      display: flex;
      height: calc(100% - 100px);
      overflow-x: auto;
      padding: 1rem 1.5rem;
      padding-bottom: 3rem;
      box-sizing: border-box;
      gap: 1.5rem;
      scroll-behavior: smooth;
    }

    .column {
      flex: 0 0 300px;
      background: #e6dfef;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 1rem;
    }

    .column h2 {
      text-align: center;
      margin: 0;
      padding: 1rem 0;
      font-size: 1.2rem;
      color: #5c3d79;
      border-bottom: 1px solid #d3cde0;
      width: 100%;
    }

    .materia {
      width: 230px;
      height: 130px;
      margin: 0.6rem auto;
      padding: 1rem;
      background: #d9cee9;
      border-radius: 10px;
      cursor: pointer;
      position: relative;
      font-size: 1.1rem;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      transition: transform 0.3s ease, background 0.3s;
    }

    .column:last-child .materia {
      width: 250px;
    }

    .materia:hover {
      background: #cfc3e3;
    }

    .materia.aprobada {
      background: #9f85c1;
      color: white;
      text-decoration: line-through;
    }

    .materia.bloqueada {
      background: #f0ebf6;
      color: #aaa;
      cursor: not-allowed;
    }

    .tooltip {
      visibility: hidden;
      opacity: 0;
      background: #5c3d79;
      color: white;
      border-radius: 4px;
      padding: 4px 6px;
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 0.8rem;
      transition: opacity 0.3s;
      z-index: 1;
    }

    .materia:hover .tooltip {
      visibility: visible;
      opacity: 1;
    }
     .separador-final {
      height: 1.5px;
      background: #ccc;
      margin: 0 2.5rem;
    }
  </style>
</head>
<body>
  <h1>Malla Curricular - Ingeniería en Sistemas</h1>
  <div class="grid" id="malla"></div>
  <div class="separador-final"></div> 

  <script>
    const data = [
      { ciclo: "Semestre 1", materias: [
        { codigo: "ECO100", nombre: "Introducción a la Economía", requiere: [] },
        { codigo: "MAT100", nombre: "Calculo I", requiere: [] },
        { codigo: "CPA100", nombre: "Contabilidad I", requiere: [] },
        { codigo: "CJS100", nombre: "Administración Tributaria", requiere: [] },
        { codigo: "INV100", nombre: "Introducción a la Investigación", requiere: [] },
        { codigo: "ADM100", nombre: "Administración I", requiere: [] }
      ]},
      { ciclo: "Semestre 2", materias: [
        { codigo: "ECO150", nombre: "Microeconomía I", requiere: ["ECO100", "MAT100"] },
        { codigo: "MAT150", nombre: "Calculo II", requiere: ["MAT100"] },
        { codigo: "CPA150", nombre: "Contabilidad II", requiere: ["CPA100"] },
        { codigo: "PSI150", nombre: "Psicología Social e Industrial", requiere: ["INV100"] },
        { codigo: "ADM150", nombre: "Administración II", requiere: ["ADM100"] }
      ]},
      { ciclo: "Semestre 3", materias: [
        { codigo: "ECO200", nombre: "Microeconomía II", requiere: ["ECO150", "MAT150"] },
        { codigo: "MAT200", nombre: "Algebra Lineal y Teoría Matricial", requiere: ["MAT150"] },
        { codigo: "MAT210", nombre: "Estadística I", requiere: ["MAT150"] },
        { codigo: "CPA200", nombre: "Contabilidad III", requiere: ["CPA150"] },
        { codigo: "ADM200", nombre: "Organización y Sistemas", requiere: ["ADM150"] }
      ]},
      { ciclo: "Semestre 4", materias: [
        { codigo: "ECO250", nombre: "Macroeconomía I", requiere: ["ECO200", "MAT200"] },
        { codigo: "MAT250", nombre: "Ingeniería Económica I", requiere: ["MAT200"] },
        { codigo: "MAT260", nombre: "Estadística II", requiere: ["MAT210"] },
        { codigo: "CPA250", nombre: "Costos I", requiere: ["CPA200", "CJS100"] },
        { codigo: "CJS250", nombre: "Legislación Laboral y Emp.", requiere: ["CPA150"] },
        { codigo: "ADM250", nombre: "Administración Pública", requiere: ["ADM200"] }
      ]},
      { ciclo: "Semestre 5", materias: [
        { codigo: "ECO300", nombre: "Teoría Monetaria y Fiscal", requiere: ["ECO250"] },
        { codigo: "FIN300", nombre: "El Sistema Financiero", requiere: ["ECO200", "MAT250"] },
        { codigo: "MAT300", nombre: "Ingeniería Económica II", requiere: ["MAT250"] },
        { codigo: "IFI300", nombre: "Ingeniería Financiera I", requiere: ["CPA200"] },
        { codigo: "PRE300", nombre: "Presupuesto y Control", requiere: ["CPA250"] },
        { codigo: "CPA300", nombre: "Contabilidad Fiscal", requiere: ["CPA250"] }
      ]},
      { ciclo: "Semestre 6", materias: [
        { codigo: "ECO360", nombre: "Econometría", requiere: ["MAT300"] },
        { codigo: "IFI360", nombre: "Análisis e Interp. de Estados Fin.", requiere: ["IFI300"] },
        { codigo: "FIA350", nombre: "Finanzas Agropecuarias", requiere: ["CPA250", "IFI300"] },
        { codigo: "IFI350", nombre: "Ingeniería Financiera II", requiere: ["IFI300"] },
        { codigo: "CPA350", nombre: "Contabilidad Especiales", requiere: ["CPA250", "CPA300"] },
        { codigo: "ADM350", nombre: "Administración de personal", requiere: ["CJS250"] }
      ]},
      { ciclo: "Semestre 7", materias: [
        { codigo: "FIN410", nombre: "Marketing y Serv. Financiero", requiere: ["FIN300"] },
        { codigo: "ECO400", nombre: "Prep. Y Eva. De Proyectos", requiere: ["PRE300","ECO360"] },
        { codigo: "FIN400", nombre: "Finanzas, Banca Seg. y Pensiones", requiere: ["IFI360"] },
        { codigo: "MOF400", nombre: "Modelación Financiera", requiere: ["IFI350"] },
        { codigo: "FIC400", nombre: "Finanzas Corporativas I", requiere: ["IFI350"] },
        { codigo: "FIN420", nombre: "Mercado de Valores", requiere: ["IFI350"] }
      ]},
      { ciclo: "Semestre 8", materias: [
        { codigo: "FIN470", nombre: "Sistema de Reg. Financiero", requiere: ["FIN300","FIN400"] },
        { codigo: "CPA450", nombre: "Auditoria Financiera", requiere: ["CPA350","FIN400"] },
        { codigo: "FIN450", nombre: "Diseño de Sistema Fin.", requiere: ["FIC400","MOF400"] },
        { codigo: "FIC450", nombre: "Finanzas Corporativas II", requiere: ["FIC400"] },
        { codigo: "FIN460", nombre: "Finanzas Internacionales", requiere: ["FIC400","FIN420"] }
      ]},
      { ciclo: "Semestre 9", materias: [
        { codigo: "IFI500", nombre: "Trabajo Final de Grado", requiere: ["FIN450","FIN470"] },
        { codigo: "FIN520", nombre: "Teoría de las Decisiones", requiere: ["MOF400","FIN470"] },
        { codigo: "FIN500", nombre: "Taller de Valor de la Empresa", requiere: ["MOF400","FIC450"] },
        { codigo: "FIN510", nombre: "Juego de Bolsa", requiere: ["FIN420","FIC450"] },
        { codigo: "FIN530", nombre: "Finanzas de las Pymes", requiere: ["IFI300","MOF400"] },
        { codigo: "INV500", nombre: "Metodología de la Investigación", requiere: ["INV100","ECO360"] }
      ]},
      { ciclo: "Semestre 10", materias: [
        { codigo: "IFI550", nombre: "Tesis", requiere: ["IFI500","FIN520","FIN500","FIN510","FIN530","INV500"] },
        { codigo: "IFI560", nombre: "Proyecto de Grado", requiere: ["IFI500","FIN520","FIN500","FIN510","FIN530","INV500"] },
        { codigo: "IFI570", nombre: "Examen de Grado", requiere: ["IFI500","FIN520","FIN500","FIN510","FIN530","INV500"] },
        { codigo: "IFI580", nombre: "Internado Rotatorio", requiere: ["IFI500","FIN520","FIN500","FIN510","FIN530","INV500"] },
        { codigo: "IFI590", nombre: "Trabajo Dirigido", requiere: ["IFI500","FIN520","FIN500","FIN510","FIN530","INV500"] },
        { codigo: "GDI600", nombre: "Graduación Directa", requiere: ["IFI500","FIN520","FIN500","FIN510","FIN530","INV500"] }
      ]}
    ];

    const estado = JSON.parse(localStorage.getItem("estadoMaterias") || "{}");
    let materiasAprobadas = new Set(Object.keys(estado).filter(c => estado[c]));

    function puedeAprobar(materia) {
      return materia.requiere.every(r => materiasAprobadas.has(r));
    }

    function contarElectivas() {
      return [...materiasAprobadas].filter(c => c.startsWith("ELEC")).length;
    }

    function render() {
      const cont = document.getElementById("malla");
      cont.innerHTML = "";
      data.forEach(({ ciclo, materias }) => {
        const col = document.createElement("div");
        col.className = "column";
        col.innerHTML = `<h2>${ciclo}</h2>`;
        materias.forEach(m => {
          const div = document.createElement("div");
          div.className = "materia";
          div.textContent = m.nombre;

          const aprobada = materiasAprobadas.has(m.codigo);
          const puede = puedeAprobar(m);
          const esElectiva = m.codigo.startsWith("ELEC");

          if (aprobada) div.classList.add("aprobada");
          else if (!puede) {
            div.classList.add("bloqueada");
            const tt = document.createElement("span");
            tt.className = "tooltip";
            tt.textContent = "Falta: " + m.requiere.filter(r => !materiasAprobadas.has(r)).join(", ");
            div.appendChild(tt);
          }

          div.onclick = () => {
            if (!puede && !aprobada) return;
            if (esElectiva && !aprobada && contarElectivas() >= 4) return;

            estado[m.codigo] = !aprobada;
            localStorage.setItem("estadoMaterias", JSON.stringify(estado));
            materiasAprobadas = new Set(Object.keys(estado).filter(c => estado[c]));
            render();
          };

          col.appendChild(div);
        });
        cont.appendChild(col);
      });
    }

    render();
  </script>
</body>
</html>
